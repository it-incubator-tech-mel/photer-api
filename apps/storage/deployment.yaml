apiVersion: apps/v1
kind: Deployment
metadata:
  name: DEPLOYMENT_NAME
  namespace: NAMESPACE
  labels:
    app: PROJECT
spec:
  selector:
    matchLabels:
      project: PROJECT
  template:
    metadata:
      namespace: NAMESPACE
      labels:
        project: PROJECT
    spec:
      containers:
        - name: PROJECT
          image: REGISTRY_HOSTNAME/PROJECT:TAG_VERSION
          ports:
            - containerPort: PORT_CONTAINER

          env:
            - name: SECRET_KEY_YANDEX
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: SECRET_KEY_YANDEX
            - name: ACCESS_KEY_YANDEX
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: ACCESS_KEY_YANDEX
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: MONGODB_URL
            - name: ENV_TYPE
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: ENV_TYPE
            - name: HOST_NAME_TCP
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: HOST_NAME_TCP
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: S3_REGION
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: S3_BUCKET_NAME
            - name: S3_PUBLIC_URL_BASE
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: S3_PUBLIC_URL_BASE
            - name: PORT_TCP
              valueFrom:
                secretKeyRef:
                  name: file-storage-production-config-secret
                  key: PORT_TCP
